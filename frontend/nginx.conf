# ═══════════════════════════════════════════════════════════════════
# WATHEEQ - NGINX CONFIGURATION
# Marketing site at / + App SPA at /login and app routes
# ═══════════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name bewathiq.com www.bewathiq.com;

    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        allow all;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name bewathiq.com www.bewathiq.com;

    ssl_certificate /etc/letsencrypt/live/bewathiq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bewathiq.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ═══ API ═══
    location ^~ /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 50M;
    }

    # ═══ Socket.IO ═══
    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # ═══ Uploaded files ═══
    location ^~ /uploads/ {
        root /;
        expires 30d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
    }

    # ═══ App Vite assets (/assets/) ═══
    location ^~ /assets/ {
        alias /usr/share/nginx/app/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ═══ Marketing Vite assets (/m-assets/) ═══
    location ^~ /m-assets/ {
        alias /usr/share/nginx/marketing/m-assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ═══ App SPA pages — serve app's index.html ═══
    location ~ ^/(login|register|forgot-password|privacy|super-admin|accept-invitation) {
        root /usr/share/nginx/app;
        try_files /index.html =404;
    }

    # App slug routes (/:slug/dashboard, /:slug/cases, etc.)
    location ~ ^/[a-zA-Z0-9_-]+/(dashboard|cases|clients|calendar|documents|tasks|invoices|forms|chat|hr|finance|company|settings|legal-search|legal-library|reports|accounting|owner|hearings|whatsapp|analytics|messages|workflows|notifications|activity-logs|calls|marketing|legal-documents|portal) {
        root /usr/share/nginx/app;
        try_files /index.html =404;
    }

    # /:slug/owner — tenant owner panel
    location ~ ^/[a-zA-Z0-9_-]+/owner(/.*)?$ {
        root /usr/share/nginx/app;
        try_files /index.html =404;
    }

    # App static files (favicon, manifest, sw, etc.)
    location ~ ^/(favicon\.png|icon-192\.png|icon-512\.png|manifest\.json|manifest\.webmanifest|sw\.js|workbox-.+\.js|service-worker\.js) {
        root /usr/share/nginx/app;
        expires 1d;
    }

    # ═══ Marketing pages ═══
    # Exact match for homepage
    location = / {
        root /usr/share/nginx/marketing;
        try_files /index.html =404;
    }

    # Marketing sub-pages
    location ~ ^/(about|pricing|contact)$ {
        root /usr/share/nginx/marketing;
        try_files /index.html =404;
    }

    # ═══ Health check ═══
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # ═══ Default → marketing SPA fallback ═══
    location / {
        root /usr/share/nginx/marketing;
        try_files $uri $uri/ /index.html;
    }

    # ═══ Deny hidden files ═══
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
