# ═══════════════════════════════════════════════════════════════════
# WATHEEQ - NGINX CONFIGURATION
# bewathiq.com       → Marketing site only
# app.bewathiq.com   → Tenant App SPA
# owner.bewathiq.com → Super Admin SPA
# ═══════════════════════════════════════════════════════════════════

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ═══════════════════════════════════════════════════════════════════
# BLOCK 1 — HTTP → HTTPS redirect (all domains)
# ═══════════════════════════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name bewathiq.com www.bewathiq.com app.bewathiq.com owner.bewathiq.com;

    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Certbot ACME challenge — must be before redirect
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        allow all;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ═══════════════════════════════════════════════════════════════════
# BLOCK 2 — bewathiq.com → Marketing site only
# ═══════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name bewathiq.com www.bewathiq.com;

    ssl_certificate /etc/letsencrypt/live/bewathiq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bewathiq.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API (needed if marketing forms post to API)
    location ^~ /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }

    # Marketing assets
    location ^~ /m-assets/ {
        alias /usr/share/nginx/marketing/m-assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Redirect login/app paths → app subdomain
    location ~ ^/(login|register|forgot-password) {
        return 301 https://app.bewathiq.com$request_uri;
    }

    # Marketing SPA fallback
    location / {
        root /usr/share/nginx/marketing;
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ═══════════════════════════════════════════════════════════════════
# BLOCK 3 — app.bewathiq.com → Tenant App SPA
# ═══════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name app.bewathiq.com;

    ssl_certificate /etc/letsencrypt/live/app.bewathiq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.bewathiq.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API
    location ^~ /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 50M;
    }

    # Socket.IO
    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # Uploaded files
    location ^~ /uploads/ {
        root /;
        expires 30d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
    }

    # App Vite assets
    location ^~ /assets/ {
        alias /usr/share/nginx/app/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PWA static files
    location ~ ^/(favicon\.png|icon-192\.png|icon-512\.png|manifest\.json|manifest\.webmanifest|sw\.js|workbox-.+\.js|service-worker\.js) {
        root /usr/share/nginx/app;
        expires 1d;
    }

    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Block super-admin on app subdomain → redirect to owner subdomain
    location ~ ^/super-admin {
        return 301 https://owner.bewathiq.com$request_uri;
    }

    # All app routes → React SPA
    location / {
        root /usr/share/nginx/app;
        try_files $uri /index.html;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ═══════════════════════════════════════════════════════════════════
# BLOCK 4 — owner.bewathiq.com → Super Admin SPA
# NOTE: Requires AAAA (IPv6) DNS record deleted from Hostinger panel
#       and SSL cert: certbot certonly --webroot -w /var/www/certbot
#                     -d owner.bewathiq.com --non-interactive --agree-tos --email info@bewathiq.com
# ═══════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name owner.bewathiq.com;

    # Use bewathiq.com cert until owner cert is obtained
    ssl_certificate /etc/letsencrypt/live/bewathiq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bewathiq.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API
    location ^~ /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 50M;
    }

    # App Vite assets
    location ^~ /assets/ {
        alias /usr/share/nginx/app/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PWA static files
    location ~ ^/(favicon\.png|icon-192\.png|icon-512\.png|manifest\.json|manifest\.webmanifest|sw\.js|workbox-.+\.js|service-worker\.js) {
        root /usr/share/nginx/app;
        expires 1d;
    }

    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Root → redirect to super-admin login
    location = / {
        return 301 https://owner.bewathiq.com/super-admin/login;
    }

    # All routes → React SPA (handles /super-admin/* routes)
    location / {
        root /usr/share/nginx/app;
        try_files $uri /index.html;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
