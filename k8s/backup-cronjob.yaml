# ═══════════════════════════════════════════════════════════════════
# WATHEEQ DATABASE BACKUP CRONJOB
# Runs daily at 2:00 AM
# ═══════════════════════════════════════════════════════════════════
apiVersion: batch/v1
kind: CronJob
metadata:
  name: database-backup
  namespace: watheeq
spec:
  schedule: "0 2 * * *"  # Daily at 2:00 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backup
              image: postgres:15-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  DATE=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/backup/watheeq_backup_${DATE}.sql.gz"
                  
                  echo "Starting backup..."
                  pg_dump -h postgres-service -U watheeq -d watheeq | gzip > $BACKUP_FILE
                  
                  echo "Backup created: $BACKUP_FILE"
                  ls -lh /backup/
                  
                  # Clean old backups (keep last 30 days)
                  find /backup -name "watheeq_backup_*.sql.gz" -mtime +30 -delete
                  
                  echo "Backup completed successfully"
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: watheeq-secrets
                      key: DB_PASSWORD
              volumeMounts:
                - name: backup-volume
                  mountPath: /backup
          restartPolicy: OnFailure
          volumes:
            - name: backup-volume
              persistentVolumeClaim:
                claimName: backup-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-pvc
  namespace: watheeq
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: standard
