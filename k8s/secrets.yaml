# ═══════════════════════════════════════════════════════════════════
# WATHEEQ KUBERNETES SECRETS
# Note: In production, use external secrets manager (Vault, AWS Secrets)
# Values below are placeholders - replace with base64 encoded secrets
# Example: echo -n 'your-password' | base64
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: watheeq-secrets
  namespace: watheeq
type: Opaque
stringData:
  # Database password (replace with actual value)
  DB_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"
  
  # Redis password (replace with actual value)
  REDIS_PASSWORD: "CHANGE_ME_REDIS_PASSWORD"
  
  # JWT Secret (replace with 64+ character random string)
  JWT_SECRET: "CHANGE_ME_LONG_JWT_SECRET_64_CHARACTERS_MINIMUM"
  
  # Encryption key (must be exactly 32 characters)
  ENCRYPTION_KEY: "CHANGE_ME_32_CHARACTER_KEY_HERE"
  
  # SendGrid API Key
  SENDGRID_API_KEY: "CHANGE_ME"
  
  # OpenAI API Key
  OPENAI_API_KEY: "CHANGE_ME"
