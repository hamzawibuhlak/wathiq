services:
  postgres:
    image: postgres:15-alpine
    container_name: watheeq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-watheeq_prod}
      POSTGRES_USER: ${POSTGRES_USER:-watheeq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-watheeq} -d ${POSTGRES_DB:-watheeq_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - watheeq_network

  redis:
    image: redis:7-alpine
    container_name: watheeq_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - watheeq_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: watheeq_backend
    restart: unless-stopped
    env_file: ./backend/.env.production
    volumes:
      - backend_uploads:/app/uploads
      - whatsapp_sessions:/app/whatsapp-sessions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - watheeq_network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NGINX_CONF: nginx.prod.conf
        VITE_API_URL: /api
        VITE_APP_NAME: وسم الثقة
    container_name: watheeq_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - watheeq_network

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  whatsapp_sessions:

networks:
  watheeq_network:
    driver: bridge
