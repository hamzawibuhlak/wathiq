# ═══════════════════════════════════════════════════════════════════
# WATHEEQ MVP - PRODUCTION DOCKER COMPOSE
# Optimized for production deployment
# ═══════════════════════════════════════════════════════════════════

version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════
  # PostgreSQL Database
  # ═══════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    container_name: watheeq_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - watheeq_internal
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ═══════════════════════════════════════════════════════════════════
  # Redis Cache
  # ═══════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: watheeq_redis_prod
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - watheeq_internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ═══════════════════════════════════════════════════════════════════
  # Backend (NestJS) - Production
  # ═══════════════════════════════════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: watheeq_backend_prod
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3000
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/uploads
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - watheeq_internal
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
      replicas: 1

  # ═══════════════════════════════════════════════════════════════════
  # Frontend (Nginx) - Production
  # ═══════════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_APP_NAME: Watheeq
    container_name: watheeq_frontend_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - backend_uploads:/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - watheeq_internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

# ═══════════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════════
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local

# ═══════════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════════
networks:
  watheeq_internal:
    driver: bridge
    internal: false
